<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraStream Studio Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-base: #0a0908;
      --card-bg: rgba(24, 20, 20, 0.65);
      --accent-rgb: 224, 122, 95; /* Dynamic fallback */
      --accent: rgb(var(--accent-rgb));
      --text-main: #f4f1de;
      --text-muted: #a0978d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
      transition: background 1.2s ease-in-out;
    }

    /* Ambient Dynamic Backdrop Glow Effect */
    .ambient-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.25) 0%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      filter: blur(60px);
      pointer-events: none;
      transition: all 1.5s ease;
    }

    .player-container {
      background: var(--card-bg);
      backdrop-filter: blur(25px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
      max-width: 950px;
      border-radius: 28px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .now-playing-panel {
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Track art interactive zone */
    .art-frame {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 25px;
      perspective: 1000px;
    }

    .track-art {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transition: transform 0.1s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }

    /* Real-Time Audio Canvas Layer Overlaid */
    .visualizer-canvas {
      width: 100%;
      height: 60px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .track-details {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .track-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .track-artist {
      font-size: 15px;
      color: var(--text-muted);
    }

    /* Progress Control Elements */
    .progress-container {
      width: 100%;
      margin-bottom: 20px;
    }

    .progress-bar {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }

    .time-stamps {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 600;
    }

    /* Hotkeys Badge Display bar */
    .hotkey-badge {
      font-size: 11px;
      background: rgba(255,255,255,0.06);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.03);
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hotkey-badge kbd {
      background: #333;
      color: #fff;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10px;
    }

    .controls-wrapper {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 20px;
    }

    .btn-control {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-control:hover {
      color: var(--text-main);
      transform: scale(1.08);
    }

    .btn-play-pause {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.35);
    }

    .btn-play-pause:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.5);
    }

    .btn-active {
      color: var(--accent) !important;
      text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.6);
    }

    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 60%;
    }

    .volume-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    /* Playlist Panel System */
    .playlist-panel {
      padding: 40px 30px;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
    }

    .playlist-header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .playlist-count {
      font-size: 12px;
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.12);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .playlist-tracks {
      overflow-y: auto;
      flex-grow: 1;
      max-height: 400px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .playlist-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .playlist-item.active-item {
      background: rgba(var(--accent-rgb), 0.08);
      border-color: rgba(var(--accent-rgb), 0.2);
    }

    .item-art {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
    }

    .item-details {
      flex-grow: 1;
      min-width: 0;
    }

    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .active-item .item-title {
      color: var(--accent);
    }

    .item-artist {
      font-size: 12px;
      color: var(--text-muted);
    }

    .item-duration {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Cross-origin Image processing storage element */
    #canvas-helper {
      display: none;
    }

    @media (max-width: 768px) {
      .player-container { grid-template-columns: 1fr; }
      .now-playing-panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
    }
  </style>
</head>
<body>

  <div class="ambient-glow" id="glow-layer"></div>
  <canvas id="canvas-helper"></canvas>

  <div class="player-container" id="player">
    <audio id="audio-element" crossorigin="anonymous"></audio>

    <!-- Dashboard Operations Wrapper -->
    <div class="now-playing-panel">
      <div class="art-frame" id="interactive-art-frame">
        <!-- Notice: Use images with valid CORS headers or absolute local routes to prevent Canvas extraction security locks -->
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=400&auto=format&fit=crop" alt="Track Art" class="track-art" id="ui-art">
      </div>
      
      <!-- Real Time Waveform Integration -->
      <canvas class="visualizer-canvas" id="visualizer"></canvas>

      <div class="track-details">
        <h2 class="track-title" id="ui-title">Loading...</h2>
        <p class="track-artist" id="ui-artist">Please wait</p>
      </div>

      <div class="progress-container">
        <input type="range" class="progress-bar" id="ui-progress" min="0" max="100" value="0">
        <div class="time-stamps">
          <span id="ui-current-time">0:00</span>
          <span id="ui-duration">0:00</span>
        </div>
      </div>

      <div class="controls-wrapper">
        <button class="btn-control" id="btn-shuffle"><i class="fas fa-random"></i></button>
        <button class="btn-control" id="btn-prev"><i class="fas fa-step-backward"></i></button>
        <button class="btn-control btn-play-pause" id="btn-play"><i class="fas fa-play" id="play-icon"></i></button>
        <button class="btn-control" id="btn-next"><i class="fas fa-step-forward"></i></button>
        <button class="btn-control" id="btn-repeat"><i class="fas fa-redo"></i></button>
      </div>

      <div class="volume-wrapper">
        <i class="fas fa-volume-up" id="ui-volume-icon" style="color: var(--text-muted); font-size:13px;"></i>
        <input type="range" class="volume-slider" id="ui-volume" min="0" max="1" step="0.05" value="0.7">
      </div>

      <div class="hotkey-badge">
        <i class="fas fa-keyboard"></i> Press <kbd>Space</kbd> to Play / Pause or <kbd>←</kbd> <kbd>→</kbd> to skip
      </div>
    </div>

    <!-- Right Queue Management Panel -->
    <div class="playlist-panel">
      <div class="playlist-header">
        <span>Up Next / Queue</span>
        <span class="playlist-count" id="ui-queue-count">0 Songs</span>
      </div>
      <div class="playlist-tracks" id="ui-playlist-container"></div>
    </div>
  </div>

  <script>
    // Asset configurations with fallback audio tracks 
    const playlistData = [
      { id: 0, title: "Pasoori", artist: "Ali Sethi x Shae Gill", duration: "3:44", cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=400&auto=format&fit=crop", source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { id: 1, title: "Tu Jaane Na", artist: "Atif Aslam", duration: "5:37", cover: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?q=80&w=400&auto=format&fit=crop", source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { id: 2, title: "Kahani Suno 2.0", artist: "Kaifi Khalil", duration: "2:53", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=400&auto=format&fit=crop", source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
      { id: 3, title: "Kun Faya Kun", artist: "A.R. Rahman", duration: "7:53", cover: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?q=80&w=400&auto=format&fit=crop", source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" }
    ];

    let currentTrackIndex = 0;
    let isPlaying = false;
    let isShuffle = false;
    let isRepeatSingle = false;

    // Web Audio API context placeholder states for runtime initialization
    let audioCtx = null;
    let analyzer = null;
    let sourceNode = null;
    let visualizerAnimationId = null;

    const audio = document.getElementById('audio-element');
    const playBtn = document.getElementById('btn-play');
    const playIcon = document.getElementById('play-icon');
    const progressBar = document.getElementById('ui-progress');
    const volumeSlider = document.getElementById('ui-volume');
    const uiArt = document.getElementById('ui-art');
    const uiTitle = document.getElementById('ui-title');
    const uiArtist = document.getElementById('ui-artist');
    const uiPlaylistContainer = document.getElementById('ui-playlist-container');
    const glowLayer = document.getElementById('glow-layer');
    const artFrame = document.getElementById('interactive-art-frame');
    const vCanvas = document.getElementById('visualizer');
    const vCtx = vCanvas.getContext('2d');

    function initPlayer() {
      renderPlaylist();
      loadTrack(currentTrackIndex);
      setupGlobalEventBindings();
    }

    function setupGlobalEventBindings() {
      playBtn.addEventListener('click', togglePlay);
      document.getElementById('btn-next').addEventListener('click', nextTrack);
      document.getElementById('btn-prev').addEventListener('click', prevTrack);
      
      document.getElementById('btn-shuffle').addEventListener('click', function() {
        isShuffle = !isShuffle;
        this.classList.toggle('btn-active', isShuffle);
      });

      document.getElementById('btn-repeat').addEventListener('click', function() {
        isRepeatSingle = !isRepeatSingle;
        this.classList.toggle('btn-active', isRepeatSingle);
      });

      audio.addEventListener('timeupdate', () => {
        if(audio.duration) {
          progressBar.value = (audio.currentTime / audio.duration) * 100;
          document.getElementById('ui-current-time').textContent = formatTime(audio.currentTime);
        }
      });

      audio.addEventListener('loadedmetadata', () => {
        document.getElementById('ui-duration').textContent = formatTime(audio.duration);
      });

      audio.addEventListener('ended', () => {
        if(isRepeatSingle) { audio.currentTime = 0; audio.play(); } else { nextTrack(); }
      });

      progressBar.addEventListener('input', () => {
        audio.currentTime = (progressBar.value / 100) * audio.duration;
      });

      volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });

      // 3D Mouse Tilt Interaction Logic
      artFrame.addEventListener('mousemove', handleCardTilt);
      artFrame.addEventListener('mouseleave', resetCardTilt);

      // Keyboard Accessibility Framework implementation
      window.addEventListener('keydown', handleKeyboardShortcuts);
    }

    function loadTrack(index) {
      currentTrackIndex = index;
      const data = playlistData[index];
      audio.src = data.source;
      uiTitle.textContent = data.title;
      uiArtist.textContent = data.artist;
      
      // Setup dynamic image loaders to fix canvas extraction CORS constraints
      uiArt.removeAttribute('src');
      uiArt.setAttribute('crossorigin', 'anonymous');
      uiArt.src = data.cover;

      uiArt.onload = function() {
        extractDominantColor(uiArt);
      };

      document.querySelectorAll('.playlist-item').forEach((el, idx) => {
        el.classList.toggle('active-item', idx === index);
      });

      if(isPlaying) {
        audio.play().then(() => initAudioContextEngine());
      }
    }

    function togglePlay() {
      if(isPlaying) {
        audio.pause();
        isPlaying = false;
        playIcon.className = "fas fa-play";
      } else {
        audio.play().then(() => initAudioContextEngine());
        isPlaying = true;
        playIcon.className = "fas fa-pause";
      }
    }

    function nextTrack() {
      let nextIdx = (currentTrackIndex + 1) % playlistData.length;
      if (isShuffle) nextIdx = Math.floor(Math.random() * playlistData.length);
      loadTrack(nextIdx);
    }

    function prevTrack() {
      let prevIdx = currentTrackIndex - 1 < 0 ? playlistData.length - 1 : currentTrackIndex - 1;
      loadTrack(prevIdx);
    }

    // Advanced: Real-Time Dynamic Color Ambient Extraction Pipeline
    function extractDominantColor(imgEl) {
      try {
        const canvas = document.getElementById('canvas-helper');
        const ctx = canvas.getContext('2d');
        canvas.width = 40;
        canvas.height = 40;
        ctx.drawImage(imgEl, 0, 0, 40, 40);
        
        const imgData = ctx.getImageData(0, 0, 40, 40).data;
        let r = 0, g = 0, b = 0, count = 0;
        
        for (let i = 0; i < imgData.length; i += 4) {
          // Filter down black/white balance limits
          if(imgData[i]+imgData[i+1]+imgData[i+2] > 60 && imgData[i]+imgData[i+1]+imgData[i+2] < 700) {
            r += imgData[i]; g += imgData[i+1]; b += imgData[i+2];
            count++;
          }
        }
        
        if(count > 0) {
          r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
          // Apply extracted state vectors across document configuration styling dynamically
          document.documentElement.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
          glowLayer.style.background = `radial-gradient(circle, rgba(${r},${g},${b},0.3) 0%, rgba(0,0,0,0) 75%)`;
          document.body.style.background = `radial-gradient(circle at top left, rgba(${r},${g},${b},0.12) 0%, #0a0908 80%)`;
        }
      } catch (e) {
        console.warn("Dynamic Color Matrix Extraction intercepted by browser asset policy framework.");
      }
    }

    // Advanced: Web Audio Context Visualization Renderer engine
    function initAudioContextEngine() {
      if (audioCtx) return; // Prevent recreation hooks execution loop
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyzer = audioCtx.createAnalyser();
      analyzer.fftSize = 64; // Low-latency array dimensions
      
      sourceNode = audioCtx.createMediaElementSource(audio);
      sourceNode.connect(analyzer);
      analyzer.connect(audioCtx.destination);
      
      renderWaveformLoop();
    }

    function renderWaveformLoop() {
      visualizerAnimationId = requestAnimationFrame(renderWaveformLoop);
      const bufferLength = analyzer.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyzer.getByteFrequencyData(dataArray);

      vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
      
      const barWidth = (vCanvas.width / bufferLength) * 1.4;
      let barHeight;
      let x = 0;

      for(let i = 0; i < bufferLength; i++) {
        barHeight = dataArray[i] / 4.5;
        
        // Dynamic Accent mapping calculation matching runtime extraction states
        let rgbAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb');
        vCtx.fillStyle = `rgba(${rgbAccent}, ${Math.max(0.3, barHeight / 30)})`;
        
        // Mirror standard scale mapping transformation calculations
        vCtx.fillRect(x, vCanvas.height - barHeight, barWidth - 3, barHeight);
        x += barWidth;
      }
    }

    // 3D Micro Interaction handling transformations
    function handleCardTilt(e) {
      const box = artFrame.getBoundingClientRect();
      const x = e.clientX - box.left - (box.width / 2);
      const y = e.clientY - box.top - (box.height / 2);
      uiArt.style.transform = `rotateX(${-y / 10}deg) rotateY(${x / 10}deg) scale(1.03)`;
    }

    function resetCardTilt() {
      uiArt.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
    }

    // Advanced Keyboard Mapping Controls Framework
    function handleKeyboardShortcuts(e) {
      if (e.code === "Space") {
        e.preventDefault();
        togglePlay();
      } else if (e.code === "ArrowRight") {
        e.preventDefault();
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
      } else if (e.code === "ArrowLeft") {
        e.preventDefault();
        audio.currentTime = Math.max(0, audio.currentTime - 5);
      } else if (e.code === "ArrowUp") {
        e.preventDefault();
        volumeSlider.value = Math.min(1, parseFloat(volumeSlider.value) + 0.05);
        audio.volume = volumeSlider.value;
      } else if (e.code === "ArrowDown") {
        e.preventDefault();
        volumeSlider.value = Math.max(0, parseFloat(volumeSlider.value) - 0.05);
        audio.volume = volumeSlider.value;
      }
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function renderPlaylist() {
      uiPlaylistContainer.innerHTML = '';
      playlistData.forEach((track, index) => {
        const item = document.createElement('div');
        item.className = `playlist-item ${index === currentTrackIndex ? 'active-item' : ''}`;
        item.innerHTML = `
          <img src="${track.cover}" alt="" class="item-art">
          <div class="item-details">
            <h4 class="item-title">${track.title}</h4>
            <p class="item-artist">${track.artist}</p>
          </div>
          <span class="item-duration">${track.duration}</span>
        `;
        item.addEventListener('click', () => {
          isPlaying = true;
          playIcon.className = "fas fa-pause";
          loadTrack(index);
        });
        uiPlaylistContainer.appendChild(item);
      });
      document.getElementById('ui-queue-count').textContent = `${playlistData.length} Songs`;
    }

    window.addEventListener('DOMContentLoaded', initPlayer);
  </script>
</body>
</html>
